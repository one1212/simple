<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>세광교회 청년부</title>

  <!-- 사용자 CSS -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <header class="header">
    <div class="left-box">
      <img src="/img/세광 청년부 로고.jpg" alt="세광교회 청년부 로고" class="logo" />
    </div>

    <nav class="nav-links">
      <a href="#">청년부 소개</a>
      <a href="#">부서 소개</a>
      <a href="#">예배 시간 안내</a>
      <a href="#">이번주 설교</a>
      <a href="#">주보보기</a>
      <a href="#">커뮤니티</a>
    </nav>
  </header>

  <input type="radio" name="slide" id="slide01" checked>
  <input type="radio" name="slide" id="slide02">
  <input type="radio" name="slide" id="slide03">




  <!-- 슬라이드 wrapper -->
  <div class="slidewrap">
    <ul class="slidelist">
      <li>
        <label for="slide03" class="left"></label>
        <img src="/img/발밤발밤.png" alt="발밤발밤" />
        <label for="slide02" class="right"></label>
      </li>
      <li>
        <label for="slide01" class="left"></label>
        <img src="/img/세광 거룩한 방파제.jpg" alt="거룩한 방파제" />
        <label for="slide03" class="right"></label>
      </li>
      <li>
        <label for="slide02" class="left"></label>
        <img src="/img/세광 알림톡.jpg" alt="세광 알림톡" />
        <label for="slide01" class="right"></label>
      </li>
    </ul>
  </div>
  <section class="hero">
    <h1>어두움에 빛을 비추는 생명 공동체</h1>
    <p>복음 변화, 사랑 실천 <br />고린도 후서 5:17~18</p>
    <p><strong>여름 수련회 7월 11일(금)~13일(주일)</strong></p>
  </section>

  <h2 class="map-title">📍 우리 교회 위치</h2>
  <p class="map-description">찾아오시는 길을 카카오맵으로 확인하세요!</p>

  <!-- * 카카오맵 - 지도퍼가기 -->
  <!-- 1. 지도 노드 -->
  <div id="daumRoughmapContainer1749620535742" class="root_daum_roughmap root_daum_roughmap_landing"></div>

  <!--
	2. 설치 스크립트
	* 지도 퍼가기 서비스를 2개 이상 넣을 경우, 설치 스크립트는 하나만 삽입합니다.
-->
  <script charset="UTF-8" class="daum_roughmap_loader_script"
    src="https://ssl.daumcdn.net/dmaps/map_js_init/roughmapLoader.js"></script>

  <!-- 3. 실행 스크립트 -->
  <script charset="UTF-8">
    new daum.roughmap.Lander({
      "timestamp": "1749620535742",
      "key": "3d8bjgjdako",
      "mapWidth": "640",
      "mapHeight": "360"
    }).render();
  </script>

  <script src="../js/script.js"></script>
</body>
